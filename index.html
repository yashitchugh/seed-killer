<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Reset - Habit Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            background: #1e293b;
            max-width: 420px;
            width: 100%;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            color: #e2e8f0;
        }
        h1 { font-size: 24px; font-weight: 700; text-align: center; color: #facc15; letter-spacing: 1px; }
        .sub { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
        
        .streak-box {
            background: #0f172a;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #334155;
            margin-bottom: 24px;
        }
        .streak-number { font-size: 52px; font-weight: 800; color: #4ade80; }
        .streak-label { color: #94a3b8; font-size: 14px; letter-spacing: 2px; }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.1s ease;
            margin-bottom: 12px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-urge { background: #ef4444; color: white; }
        .btn-checkin { background: #3b82f6; color: white; }
        .btn-reset { background: #334155; color: #cbd5e1; }

        .journal-area {
            margin-top: 24px;
            background: #0f172a;
            padding: 16px;
            border-radius: 16px;
        }
        .journal-area h3 { color: #facc15; font-size: 16px; margin-bottom: 8px; }
        #journalInput {
            width: 100%;
            height: 70px;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 12px;
            color: white;
            padding: 12px;
            resize: vertical;
            font-size: 14px;
        }
        #journalInput::placeholder { color: #64748b; }
        .log-entry {
            background: #1e293b;
            padding: 10px 14px;
            border-radius: 12px;
            margin-top: 8px;
            font-size: 13px;
            color: #cbd5e1;
            border-left: 4px solid #facc15;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 11px;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1>🛡️ MY RESET</h1>
    <p class="sub">Built for you. Zero cost. Zero cloud.</p>

    <!-- Streak Section -->
    <div class="streak-box">
        <div class="streak-number" id="streakDisplay">0</div>
        <div class="streak-label">DAYS CLEAN</div>
        <div style="margin-top: 12px; font-size: 14px; color: #94a3b8;">
            Last reset: <span id="lastResetDate">Never</span>
        </div>
    </div>

    <!-- Buttons -->
    <button class="btn btn-checkin" id="checkinBtn">✅ I stayed clean today</button>
    <button class="btn btn-urge" id="urgeBtn">⚡ I HAVE AN URGE (Panic Mode)</button>
    <button class="btn btn-reset" id="resetBtn">↺ Reset Streak (Relapse)</button>

    <!-- Daily Journal (Vela's "Memory" feature) -->
    <div class="journal-area">
        <h3>📓 Daily Reflection (Vela Memory Style)</h3>
        <textarea id="journalInput" placeholder="How did you feel today? What triggered you?"></textarea>
        <button class="btn" style="background: #8b5cf6; margin-top: 8px; padding: 10px;" id="saveJournalBtn">💾 Save Memory</button>
        <div id="journalList"></div>
    </div>
    <div class="footer-note">Data stored locally on your phone. No internet required.</div>
</div>

<script>
    // -------- CORE LOGIC --------
    const STREAK_KEY = 'myResetStreak';
    const LAST_DATE_KEY = 'myResetLastDate';
    const JOURNAL_KEY = 'myResetJournal';

    function getStreak() {
        return parseInt(localStorage.getItem(STREAK_KEY)) || 0;
    }

    function getLastDate() {
        return localStorage.getItem(LAST_DATE_KEY) || null;
    }

    function updateUI() {
        document.getElementById('streakDisplay').innerText = getStreak();
        const last = getLastDate();
        document.getElementById('lastResetDate').innerText = last ? new Date(last).toLocaleDateString() : 'Never';
        renderJournal();
    }

    function saveStreak(count, date) {
        localStorage.setItem(STREAK_KEY, count.toString());
        localStorage.setItem(LAST_DATE_KEY, date);
        updateUI();
    }

    // Check-in: Increases streak by 1 if not already checked in today
    document.getElementById('checkinBtn').addEventListener('click', function() {
        const today = new Date().toISOString().split('T')[0];
        const lastDate = getLastDate();

        if (lastDate === today) {
            alert("✅ You already checked in today! Come back tomorrow.");
            return;
        }

        let current = getStreak();
        // If last date was yesterday, increase. If older, reset streak to 1.
        if (lastDate) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yStr = yesterday.toISOString().split('T')[0];
            if (lastDate === yStr) {
                current += 1;
            } else if (lastDate !== today) {
                // Missed a day, reset to 1 (or 0? Let's set to 1 for today)
                current = 1;
            }
        } else {
            current = 1;
        }

        saveStreak(current, today);
        alert(`🎉 Amazing! You're on a ${current}-day streak!`);
    });

    // Urge Button - Panic Mode (Breathing exercise + Journal prompt)
    document.getElementById('urgeBtn').addEventListener('click', function() {
        if (confirm("⚠️ You're feeling an urge. Breathe with me:\n\nInhale 4s... Hold 7s... Exhale 8s...\n\nPress OK when done.")) {
            document.getElementById('journalInput').focus();
            document.getElementById('journalInput').placeholder = "What just triggered you? Write it down to defeat it.";
            alert("🧠 Write down your trigger in the journal below. Naming it reduces its power!");
        }
    });

    // Reset (Relapse)
    document.getElementById('resetBtn').addEventListener('click', function() {
        if (confirm("❗ Are you sure you relapsed? This will reset your streak to 0.")) {
            const today = new Date().toISOString().split('T')[0];
            saveStreak(0, today);
            alert("💪 It's okay. Day 1 starts right now. You've got this.");
        }
    });

    // Journal Logic (Vela's "Memory")
    function renderJournal() {
        const list = document.getElementById('journalList');
        const entries = JSON.parse(localStorage.getItem(JOURNAL_KEY)) || [];
        list.innerHTML = '';
        // Show last 5 entries
        const recent = entries.slice(-5).reverse();
        recent.forEach(entry => {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `<strong>${entry.date}</strong><br>${entry.text}`;
            list.appendChild(div);
        });
    }

    document.getElementById('saveJournalBtn').addEventListener('click', function() {
        const text = document.getElementById('journalInput').value.trim();
        if (!text) {
            alert("Write something first!");
            return;
        }
        const entries = JSON.parse(localStorage.getItem(JOURNAL_KEY)) || [];
        entries.push({
            date: new Date().toLocaleString(),
            text: text
        });
        localStorage.setItem(JOURNAL_KEY, JSON.stringify(entries));
        document.getElementById('journalInput').value = '';
        document.getElementById('journalInput').placeholder = "How did you feel today? What triggered you?";
        renderJournal();
        alert("📖 Memory saved locally (just like Vela's pgvector, but free!).");
    });

    // Init
    updateUI();
</script>
</body>
</html>
